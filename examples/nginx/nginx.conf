load_module modules/ngx_http_vts_module.so;

worker_processes 2;
error_log /var/log/nginx/error.log notice;
pid /run/nginx.pid;

events {
    worker_connections 256;
}

http {
    vts_zone main 1m;

    proxy_cache_path /var/cache/nginx/zone1
        keys_zone=cache_zone1:1m
        levels=1:2
        max_size=10m
        inactive=10m
        use_temp_path=off;

    # ------------------------------------------------------------------
    # Origins (three loopback servers).  Each returns a slightly
    # different body so it is easy to confirm round-robin distribution
    # if you curl with proxy_cache off.  Listening on loopback only
    # keeps them out of reach from outside the container.
    # ------------------------------------------------------------------
    server {
        listen 127.0.0.1:18091;
        location / {
            add_header Cache-Control "public, max-age=300";
            return 200 "origin-1\n";
        }
    }
    server {
        listen 127.0.0.1:18092;
        location / {
            add_header Cache-Control "public, max-age=300";
            return 200 "origin-2\n";
        }
    }
    server {
        listen 127.0.0.1:18093;
        location / {
            add_header Cache-Control "public, max-age=300";
            return 200 "origin-3\n";
        }
    }

    # ------------------------------------------------------------------
    # Upstream group with three peers and uneven weights (3:2:1) so the
    # `nginx_vts_upstream_requests_total` panel shows distinguishable
    # lines instead of three identical curves.
    # ------------------------------------------------------------------
    upstream backend {
        server 127.0.0.1:18091 weight=3;
        server 127.0.0.1:18092 weight=2;
        server 127.0.0.1:18093 weight=1;
    }

    # ------------------------------------------------------------------
    # Shared bits reused by every frontend vhost.
    # ------------------------------------------------------------------
    # Key cache entries by `$host$request_uri` so the four vhosts have
    # isolated cache namespaces — same path under different vhosts is
    # cached separately, which makes per-zone HIT/MISS rates meaningful.
    proxy_cache_key $host$request_uri;
    proxy_cache_valid 200 5m;

    # Default response headers for the frontend vhosts.
    map $upstream_cache_status $vts_cache_hdr {
        default $upstream_cache_status;
        ""      "NONE";
    }

    # ------------------------------------------------------------------
    # Four frontend vhosts on the same listen port, distinguished by
    # `Host`.  Each one becomes its own `zone=` label in
    # `nginx_vts_server_requests_total`.  The first block is the
    # default_server so that Prometheus (which scrapes nginx:8080 with
    # a non-matching Host) still lands on a vhost that exposes /status.
    # ------------------------------------------------------------------
    server {
        listen 8080 default_server;
        server_name app1.example.test;

        location / {
            proxy_cache cache_zone1;
            proxy_pass http://backend;
            add_header X-Cache-Status $vts_cache_hdr;
        }

        # Send any non-empty `X-Bypass` header to force a BYPASS.
        location /bypass {
            proxy_cache cache_zone1;
            proxy_cache_bypass $http_x_bypass;
            proxy_pass http://backend/;
            add_header X-Cache-Status $vts_cache_hdr;
        }

        # Prometheus scrape target — lives on the default vhost so the
        # `nginx:8080` Host header sent by Prometheus is matched.
        location = /status {
            vts_status;
            access_log off;
            allow all;
        }
    }

    server {
        listen 8080;
        server_name app2.example.test;
        location / {
            proxy_cache cache_zone1;
            proxy_pass http://backend;
            add_header X-Cache-Status $vts_cache_hdr;
        }
    }

    server {
        listen 8080;
        server_name api.example.test;
        location / {
            proxy_cache cache_zone1;
            proxy_pass http://backend;
            add_header X-Cache-Status $vts_cache_hdr;
        }
    }

    server {
        listen 8080;
        server_name static.example.test;
        location / {
            proxy_cache cache_zone1;
            proxy_pass http://backend;
            add_header X-Cache-Status $vts_cache_hdr;
        }
    }
}
