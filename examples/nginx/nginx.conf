load_module modules/ngx_http_vts_module.so;

worker_processes 2;
error_log /var/log/nginx/error.log notice;
pid /run/nginx.pid;

events {
    worker_connections 256;
}

http {
    vts_zone main 1m;

    proxy_cache_path /var/cache/nginx/zone1
        keys_zone=cache_zone1:1m
        levels=1:2
        max_size=10m
        inactive=10m
        use_temp_path=off;

    # Origin behind the cache.  Listens on loopback only so it cannot be
    # hit directly from outside the container.
    server {
        listen 127.0.0.1:18091;
        location / {
            add_header Cache-Control "public, max-age=300";
            return 200 "origin payload\n";
        }
    }

    upstream backend {
        server 127.0.0.1:18091;
    }

    server {
        listen 8080;
        server_name example.test;

        # Cached path: first hit is a MISS, subsequent ones are HIT.
        location / {
            proxy_cache cache_zone1;
            proxy_cache_key $request_uri;
            proxy_cache_valid 200 5m;
            proxy_pass http://backend;
            add_header X-Cache-Status $upstream_cache_status;
        }

        # Send any non-empty `X-Bypass` header to force a BYPASS.
        location /bypass {
            proxy_cache cache_zone1;
            proxy_cache_key $request_uri;
            proxy_cache_valid 200 5m;
            proxy_cache_bypass $http_x_bypass;
            proxy_pass http://backend/;
            add_header X-Cache-Status $upstream_cache_status;
        }

        # Prometheus scrape target.
        location = /status {
            vts_status;
            access_log off;
            allow all;
        }
    }
}
